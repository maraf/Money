name: Client Publish

on:
  push:
    tags:
      - 'blazor-*'

permissions:
  contents: write

jobs:
  publish-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#blazor-}"
          version="${version#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor app
        run: >
          dotnet publish src/Money.Blazor.Host/Money.Blazor.Host.csproj
          --configuration Release
          -p:VersionPrefix=${{ steps.version.outputs.value }}

      - name: Zip published output
        run: |
          cd src/Money.Blazor.Host/bin/Release/net10.0/publish/wwwroot
          zip -r "$GITHUB_WORKSPACE/money-client-${{ steps.version.outputs.value }}.zip" .

      - name: Upload to release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              money-client-${{ steps.version.outputs.value }}.zip \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              money-client-${{ steps.version.outputs.value }}.zip \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
